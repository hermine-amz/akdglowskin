<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique — AKD Glow Skin</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain-layer"></div>

<nav class="nav glass">
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="AKD Glow Skin" class="logo-img">
    AKD Glow Skin
  </a>
  <div class="nav-actions">
    <button class="nav-cta" onclick="openCart()" style="background:var(--ivory); color:var(--cacao-950); padding:10px; width:44px; height:44px; justify-content:center; position:relative;">
      <i class="ph ph-shopping-bag" style="font-size:1.3rem;"></i>
      <span class="badge" id="cartBadge" style="position:absolute;top:-4px;right:-4px;background:var(--terracotta-500);color:white;width:20px;height:20px;border-radius:50%;font-size:.7rem;display:none;align-items:center;justify-content:center;">0</span>
    </button>
  </div>
</nav>

<section style="padding-top:140px; min-height:80vh;">
  <div class="wrap">
    <div class="section-head center">
      <span class="section-eyebrow">La Boutique</span>
      <h2>Tous nos soins et gammes</h2>
    </div>

    <div class="filter-row" style="justify-content:center; margin-bottom:40px;">
      <button class="filter-chip active" onclick="renderBoutique('all')">Tous</button>
      <button class="filter-chip" onclick="renderBoutique('visage')">Visage</button>
      <button class="filter-chip" onclick="renderBoutique('corps')">Corps</button>
      <button class="filter-chip" onclick="renderBoutique('savon')">Savons</button>
      <button class="filter-chip" onclick="renderBoutique('gammes')">Gammes</button>
    </div>

    <div class="boutique-grid" id="boutiqueGrid">
      <!-- Generated by JS -->
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="footer-bottom">
      <span>© 2026 AKD Glow Skin. Tous droits réservés.</span>
    </div>
  </div>
</footer>

<script src="script.js"></script>
<script>
  function renderBoutique(filter) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    const grid = document.getElementById('boutiqueGrid');
    grid.innerHTML = '';
    const filtered = filter === 'all' ? catalog : catalog.filter(p => p.cat === filter);
    
    filtered.forEach(p => {
      const isFav = favs.includes(p.id);
      grid.innerHTML += `
        <div class="boutique-card">
          <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${p.id}" onclick="toggleFav('${p.id}')">
            <i class="${isFav ? 'ph-fill' : 'ph'} ph-heart"></i>
          </button>
          <a href="produit.html?id=${p.id}" class="img-wrap">
            <img src="${p.img}" alt="${p.name}">
          </a>
          <div class="body">
            <a href="produit.html?id=${p.id}"><h3>${p.name}</h3></a>
            <span class="price">${p.price} F</span>
            <button class="add-cart" onclick="addToCart('${p.id}')"><i class="ph ph-shopping-cart"></i></button>
          </div>
        </div>
      `;
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Wait for catalog to be available
    setTimeout(() => renderBoutique('all'), 100);
  });
</script>
</body>
</html>
