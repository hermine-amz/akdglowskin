<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produit — AKD Glow Skin</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain-layer"></div>

<nav class="nav glass">
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="AKD Glow Skin" class="logo-img">
    AKD Glow Skin
  </a>
  <div class="nav-actions">
    <button class="nav-cta" onclick="openCart()" style="background:var(--ivory); color:var(--cacao-950); padding:10px; width:44px; height:44px; justify-content:center; position:relative;">
      <i class="ph ph-shopping-bag" style="font-size:1.3rem;"></i>
      <span class="badge" id="cartBadge" style="position:absolute;top:-4px;right:-4px;background:var(--terracotta-500);color:white;width:20px;height:20px;border-radius:50%;font-size:.7rem;display:none;align-items:center;justify-content:center;">0</span>
    </button>
  </div>
</nav>

<section class="detail-section">
  <div class="wrap">
    <a href="boutique.html" style="display:inline-flex; align-items:center; gap:6px; font-weight:600; font-size:.9rem; color:var(--wood-600); margin-bottom:30px;"><i class="ph ph-arrow-left"></i> Retour à la boutique</a>
    <div class="detail-grid" id="productContainer">
      <!-- Generated by JS -->
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="footer-bottom">
      <span>© 2026 AKD Glow Skin. Tous droits réservés.</span>
    </div>
  </div>
</footer>

<script src="script.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      const product = catalog.find(p => p.id === id);
      
      if(!product) {
        document.getElementById('productContainer').innerHTML = '<h2>Produit introuvable</h2>';
        return;
      }
      
      document.title = product.name + " — AKD Glow Skin";
      const isFav = favs.includes(product.id);
      
      document.getElementById('productContainer').innerHTML = `
        <div class="detail-gallery">
          <img src="${product.img}" alt="${product.name}" loading="lazy">
        </div>
        <div class="detail-info">
          <h1>${product.name}</h1>
          <div class="price">${product.price} F</div>
          <p class="desc">${product.desc} Chaque ingrédient a été soigneusement sélectionné pour garantir une efficacité maximale tout en respectant votre barrière cutanée.</p>
          
          <div style="margin-top:20px;">
            <h4 style="font-family:var(--font-display); font-size:1.2rem; margin-bottom:10px;">Conseils d'utilisation</h4>
            <p style="color:var(--wood-600); font-size:.95rem; line-height:1.6;">Appliquez sur une peau propre et sèche. Massez doucement jusqu'à absorption complète. Usage quotidien recommandé pour de meilleurs résultats.</p>
          </div>

          <div class="detail-actions">
            <button class="btn-add" onclick="addToCart('${product.id}')"><i class="ph ph-shopping-cart"></i> Ajouter au panier</button>
            <button class="btn-fav fav-btn ${isFav ? 'active' : ''}" data-id="${product.id}" onclick="toggleFav('${product.id}')">
              <i class="${isFav ? 'ph-fill' : 'ph'} ph-heart"></i>
            </button>
          </div>
          <button class="btn-add" onclick="addToCart('${product.id}'); setTimeout(sendWhatsApp, 500);" style="background:#25D366; color:white; margin-top:-4px;"><i class="ph ph-whatsapp-logo"></i> Acheter maintenant</button>
        </div>
      `;
    }, 100);
  });
</script>
</body>
</html>
