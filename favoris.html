<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Favoris — AKD Glow Skin</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain-layer"></div>

<nav class="nav glass">
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="AKD Glow Skin" class="logo-img">
    AKD Glow Skin
  </a>
  <div class="nav-actions">
    <a href="favoris.html" class="nav-cta" style="background:transparent; color:var(--cacao-950); padding:10px; width:44px; height:44px; justify-content:center; position:relative; margin-right:-10px;"><i class="ph ph-heart" style="font-size:1.3rem;"></i></a>
    <button class="nav-cta" onclick="openCart()" style="background:var(--ivory); color:var(--cacao-950); padding:10px; width:44px; height:44px; justify-content:center; position:relative;">
      <i class="ph ph-shopping-bag" style="font-size:1.3rem;"></i>
      <span class="badge" id="cartBadge" style="position:absolute;top:-4px;right:-4px;background:var(--terracotta-500);color:white;width:20px;height:20px;border-radius:50%;font-size:.7rem;display:none;align-items:center;justify-content:center;">0</span>
    </button>
  </div>
</nav>

<section style="padding-top:140px; min-height:80vh;">
  <div class="wrap">
    <div class="section-head center">
      <span class="section-eyebrow">Mes Favoris</span>
      <h2>Vos coups de cœur</h2>
    </div>

    

    

    <div class="boutique-grid" id="boutiqueGrid">
      <!-- Generated by JS -->
    </div>
  </div>
</section>

<footer style="padding:30px 0; background:transparent;"><div class="wrap"><div class="footer-bottom" style="border-top:none; padding-top:0; justify-content:center; color:var(--wood-600);"><span>© 2026 AKD Glow Skin. Tous droits réservés.</span></div></div></footer>

<script src="script.js"></script>
<script>
  
  function renderFavoris() {
    const grid = document.getElementById('boutiqueGrid');
    grid.innerHTML = '';
    const filtered = catalog.filter(p => favs.includes(p.id));
    
    if (filtered.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px 0; color:var(--wood-600);">Vous n\'avez pas encore de favoris. Cliquez sur le petit cœur des produits pour les ajouter ici.</div>';
      return;
    }
    
    filtered.forEach(p => {
      const isFav = favs.includes(p.id);
      grid.innerHTML += `
        <div class="boutique-card">
          <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${p.id}" onclick="toggleFav('${p.id}'); setTimeout(renderFavoris, 50);">
            <i class="${isFav ? 'ph-fill' : 'ph'} ph-heart"></i>
          </button>
          <a href="produit.html?id=${p.id}" class="img-wrap">
            <img src="${p.img}" alt="${p.name}" loading="lazy">
          </a>
          <div class="body">
            <a href="produit.html?id=${p.id}"><h3>${p.name}</h3></a>
            <span class="price">${p.price} F</span>
            <button class="add-cart" onclick="addToCart('${p.id}')"><i class="ph ph-shopping-cart"></i></button>
          </div>
        </div>
      `;
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(renderFavoris, 100);
  });
</script>
</body>
</html>
